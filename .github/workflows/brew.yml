name: Brew

on:
  push:
    branches: [main]
  pull_request:

jobs:
  brew-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Create local tap
        run: |
          set -euo pipefail
          brew tap-new xtruder/tap
          repo="$(brew --repo xtruder/tap)"
          cp Formula/notify-relay.rb "$repo/Formula/notify-relay.rb"

      - name: Install formula from local tap
        run: brew install --build-from-source xtruder/tap/notify-relay

      - name: Verify binaries
        run: |
          notify-send --version
          notify-relayd --version 2>&1 | grep 'notify-relayd version='
